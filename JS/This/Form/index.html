<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form With This</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-blue-600 via-purple-100 to-pink-100 min-h-screen">
    
    <form class="bg-white backdrop-blur rounded-xl shadow-xl p-8 mb-12 w-full max-w-lg mx-auto mt-10 border-blue-100">
        <h2 class="text-center text-4xl p-3 text-blue-950 font-semibold">Add User</h2>
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2" for="name">Name</label>
            <input type="text" name="name" id="name" required
            class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
        </div>
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2" for="role">Role</label>
            <input type="text" name="role" id="role" required
            class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
        </div>
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2" for="bio">BIO</label>
            <input type="text" name="bio" id="bio" required
            class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
        </div>
        <div class="mb-5">
            <label class="block text-gray-700 font-medium mb-2" for="url">URL</label>
            <input type="text" name="url" id="url" required
            class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
        </div>

        <button class="w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white py-3 shadow-xl transition hover:to-blue-500 hover:from-purple-500 font-semibold rounded-lg" type="submit">
            Submit
        </button>
    </form>

    <div class="users grid grid-cols-1 md:grid-cols-3 gap-10 px-5">

</body>
</html>
