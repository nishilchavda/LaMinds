  <body>
    <div class="main flex justify-center items-center mt-10">
      <form class="bg-amber-100 px-6 py-4 rounded-2xl">
        <label for="dp">Profile Image :</label>
        <input
          class="block w-full outline-none border-amber-800 border-2 rounded-xl px-4 py-2 mb-5"
          type="text"
          name="dp"
          id="dp"
          placeholder="profile pic"
        />
        <label for="name1">Username :</label>
        <input
          class="block w-full outline-none border-amber-800 border-2 rounded-xl px-4 py-2 mb-5"
          type="text"
          name="name1"
          id="name1"
          placeholder="username"
        />
        <label for="post">Post :</label>
        <input
          class="block w-full outline-none border-amber-800 border-2 rounded-xl px-4 py-2 mb-5"
          type="url"
          name="post"
          id="post"
          placeholder="Image Link"
        />
        <label for="caption">Caption</label>
        <textarea
          name="caption"
          id="caption"
          cols="30"
          rows="5"
          placeholder="Write a Caption ...."
          class="border-2 border-amber-800 block px-6 py-4 rounded-xl px-4 py-2 mb-5"
        ></textarea>
        <button
        id="submit"
          class="submit w-full h-auot px-6 py-4 font-bold bg-amber-700 text-white rounded-xl"
        >
          create post
        </button>
      </form>
    </div>
