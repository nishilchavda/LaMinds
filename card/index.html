<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Airforce1 Premium - Product Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card" id="product-card">
            <!-- Image Carousel -->
            <div class="card-image-wrapper">
                <span class="badge">Best Seller</span>
                <img class="brand-logo"
                    src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Logo_NIKE.svg/1200px-Logo_NIKE.svg.png"
                    alt="Nike Logo">
                <div class="carousel" id="carousel">
                    <!-- Images injected by JS -->
                </div>
                <div class="carousel-dots" id="carousel-dots">
                    <!-- Dots injected by JS -->
                </div>
            </div>

            <!-- Card Body -->
            <div class="card-body">
                <h2 class="product-title" id="product-title"></h2>
                <p class="product-tagline" id="product-tagline"></p>
                <p class="product-description" id="product-description"></p>

                <div class="card-footer">
                    <span class="price" id="product-price"></span>
                    <button class="buy-btn" id="buy-btn">
                        Buy Now
                        <span class="arrow-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
