<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - FlashConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
    </style>
</head>

<body
    class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans antialiased h-screen overflow-hidden flex flex-col transition-colors duration-300">

    <nav
        class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 fixed z-30 w-full h-16 flex items-center justify-between px-4 lg:px-10 transition-colors duration-300">
        <div class="flex items-center gap-2 cursor-pointer group">
            <div
                class="bg-blue-500 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center transition-transform duration-500 group-hover:rotate-180">
                <i class="fa-solid fa-bolt text-xl"></i></div>
            <span class="text-xl font-bold text-gray-900 dark:text-white hidden sm:block">FlashConnect</span>
        </div>
        <div class="hidden md:flex relative w-1/3 group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i
                    class="fa-solid fa-search"></i></span>
            <input type="text"
                class="w-full bg-gray-100 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                placeholder="Search...">
        </div>
        <div class="flex items-center gap-4 sm:gap-6">
            <button
                class="text-gray-500 dark:text-gray-400 hover:text-blue-500 text-xl transition-transform hover:scale-110 duration-200"><i
                    class="fa-regular fa-bell"></i></button>
            <a href="profile.html"><img src="https://i.pravatar.cc/150?img=11" alt="Profile"
                    class="w-9 h-9 rounded-full object-cover hover:scale-105 transition-all"></a>
        </div>
    </nav>

    <main class="flex-1 overflow-hidden pt-16 flex justify-center">
        <div class="w-full max-w-7xl flex gap-6 px-4 py-6 h-full">

            <aside class="hidden md:block w-64 h-full overflow-y-auto no-scrollbar pr-4">
                <div class="flex flex-col gap-2">
                    <a href="index.html"
                        class="flex items-center gap-4 p-3 rounded-lg bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 font-semibold transition-all duration-300 hover:translate-x-2">
                        <i class="fa-solid fa-house w-6 text-center text-lg"></i> Home
                    </a>
                    <a href="explore.html"
                        class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
                        <i class="fa-solid fa-compass w-6 text-center text-lg"></i> Explore
                    </a>
                    <a href="reels.html"
                        class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
                        <i class="fa-solid fa-video w-6 text-center text-lg"></i> Reels
                    </a>
                    <a href="bookmarks.html"
                        class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
                        <i class="fa-solid fa-bookmark w-6 text-center text-lg"></i> Bookmarks
                    </a>
                    <a href="communities.html"
                        class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
                        <i class="fa-solid fa-users w-6 text-center text-lg"></i> Communities
                    </a>
                    <a href="profile.html"
                        class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
                        <i class="fa-solid fa-user w-6 text-center text-lg"></i> Profile
                    </a>
                    <a href="settings.html"
                        class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
                        <i
                            class="fa-solid fa-gear w-6 text-center text-lg group-hover:rotate-90 transition-transform duration-300"></i>
                        Settings
                    </a>
                    <button
                        class="mt-4 w-full bg-blue-500 text-white font-bold py-3 rounded-full hover:bg-blue-600 transition-all duration-300 shadow-md hover:shadow-lg hover:-translate-y-1 active:scale-95">
                        Create Post
                    </button>
                </div>
            </aside>

            <section class="flex-1 max-w-2xl h-full overflow-y-auto no-scrollbar pb-20">
                <div
                    class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 mb-6 border border-gray-200 dark:border-gray-700 animate-fade-in-up">
                    <div class="flex gap-4">
                        <img src="https://i.pravatar.cc/150?img=11" alt="Profile"
                            class="w-12 h-12 rounded-full object-cover">
                        <input type="text" placeholder="What's happening?"
                            class="w-full bg-transparent dark:text-white focus:outline-none text-lg">
                    </div>

                    <!-- Media Preview Area -->
                    <div id="media-preview" class="hidden mt-3 relative group">
                        <div id="media-preview-content"
                            class="rounded-xl overflow-hidden border border-gray-200 dark:border-gray-700 bg-black max-h-80 flex items-center justify-center">
                        </div>
                        <button id="remove-media-btn"
                            class="absolute top-2 right-2 bg-gray-900/70 hover:bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm transition-colors backdrop-blur-sm"><i
                                class="fa-solid fa-xmark"></i></button>
                    </div>

                    <hr class="my-3 border-gray-100 dark:border-gray-700">
                    <div class="flex justify-between items-center">
                        <div class="flex gap-4 text-blue-500">
                            <button id="pick-image-btn"
                                class="hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded-full transition-transform hover:scale-110 w-10 h-10"
                                title="Add Photo"><i class="fa-regular fa-image"></i></button>
                            <button id="pick-video-btn"
                                class="hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded-full transition-transform hover:scale-110 w-10 h-10"
                                title="Add Video"><i class="fa-solid fa-video"></i></button>
                        </div>
                        <button id="post-btn"
                            class="bg-blue-500 text-white px-5 py-2 rounded-full font-bold hover:bg-blue-600 transition-all active:scale-95 disabled:opacity-50">Post</button>
                    </div>
                    <input type="file" id="image-file-input" accept="image/*" class="hidden">
                    <input type="file" id="video-file-input" accept="video/*" class="hidden">
                </div>
                <div class="posts"></div>
            </section>

            <aside class="hidden lg:block w-80 h-full overflow-y-auto no-scrollbar pl-4">
                <div
                    class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-5 mb-6 border border-gray-200 dark:border-gray-700">
                    <h3 class="font-bold text-gray-900 dark:text-white text-lg mb-4">Trending</h3>
                    <div
                        class="mb-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 p-2 -mx-2 rounded-lg transition-colors group">
                        <p class="text-xs text-gray-500 dark:text-gray-400">Technology</p>
                        <h4 class="font-bold text-gray-800 dark:text-gray-200 group-hover:text-blue-500">#TailwindCSS
                        </h4>
                    </div>
                </div>

                <div
                    class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-5 border border-gray-200 dark:border-gray-700">
                    <h3 class="font-bold text-gray-900 dark:text-white text-lg mb-4">Who to follow</h3>

                    <div class="flex items-center justify-between mb-4 group">
                        <div class="flex items-center gap-3">
                            <img src="https://i.pravatar.cc/150?img=68" alt="User"
                                class="w-10 h-10 rounded-full object-cover transition-transform group-hover:scale-110">
                            <div>
                                <h4
                                    class="font-bold text-sm text-gray-900 dark:text-white hover:underline cursor-pointer">
                                    Sarah Jenkins</h4>
                                <p class="text-xs text-gray-500 dark:text-gray-400">@sarahj_art</p>
                            </div>
                        </div>
                        <button
                            class="follow-btn bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm px-4 py-1.5 rounded-full font-bold hover:opacity-80 transition-all active:scale-95"
                            data-user="sarahj_art">Follow</button>
                    </div>

                    <div class="flex items-center justify-between mb-2 group">
                        <div class="flex items-center gap-3">
                            <img src="https://i.pravatar.cc/150?img=53" alt="User"
                                class="w-10 h-10 rounded-full object-cover transition-transform group-hover:scale-110">
                            <div>
                                <h4
                                    class="font-bold text-sm text-gray-900 dark:text-white hover:underline cursor-pointer">
                                    Tech Insider</h4>
                                <p class="text-xs text-gray-500 dark:text-gray-400">@tech_insider</p>
                            </div>
                        </div>
                        <button
                            class="follow-btn bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm px-4 py-1.5 rounded-full font-bold hover:opacity-80 transition-all active:scale-95"
                            data-user="tech_insider">Follow</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <div
        class="md:hidden fixed bottom-0 w-full bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex justify-around p-3 z-30 transition-colors duration-300">
        <a href="index.html" class="text-blue-500 text-xl hover:scale-125 transition-transform"><i
                class="fa-solid fa-house"></i></a>
        <a href="explore.html" class="text-gray-500 dark:text-gray-400 text-xl hover:scale-125 transition-transform"><i
                class="fa-solid fa-compass"></i></a>
        <a href="reels.html" class="text-gray-500 dark:text-gray-400 text-xl hover:scale-125 transition-transform"><i
                class="fa-solid fa-video"></i></a>
        <a href="profile.html" class="text-gray-500 dark:text-gray-400 text-xl hover:scale-125 transition-transform"><i
                class="fa-solid fa-user"></i></a>
    </div>

    <script src="app.js"></script>
</body>

</html>
