<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - FlashConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: "class" };
    if (
      localStorage.getItem("theme") === "dark" ||
      (!("theme" in localStorage) &&
        window.matchMedia("(prefers-color-scheme: dark)").matches)
    ) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
      opacity: 0;
    }
  </style>
</head>

<body
  class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans antialiased h-screen overflow-hidden flex flex-col transition-colors duration-300">
  <nav
    class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 fixed z-30 w-full h-16 flex items-center justify-between px-4 lg:px-10 transition-colors duration-300">
    <div class="flex items-center gap-2 cursor-pointer group">
      <div
        class="bg-blue-500 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center transition-transform duration-500 group-hover:rotate-180">
        <i class="fa-solid fa-bolt text-xl"></i>
      </div>
      <span class="text-xl font-bold text-gray-900 dark:text-white hidden sm:block">FlashConnect</span>
    </div>
    <div class="hidden md:flex relative w-1/3 group">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i
          class="fa-solid fa-search"></i></span>
      <input type="text"
        class="w-full bg-gray-100 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
        placeholder="Search..." />
    </div>
    <div class="flex items-center gap-4 sm:gap-6">
      <button
        class="text-gray-500 dark:text-gray-400 hover:text-blue-500 text-xl transition-transform hover:scale-110 duration-200">
        <i class="fa-regular fa-bell"></i>
      </button>
      <a href="profile.html"><img src="https://i.pravatar.cc/150?img=11" alt="Profile"
          class="w-9 h-9 rounded-full object-cover border-2 border-transparent hover:border-blue-500 transition-all hover:scale-105" /></a>
    </div>
  </nav>

  <main class="flex-1 overflow-hidden pt-16 flex justify-center">
    <div class="w-full max-w-7xl flex gap-6 px-4 py-6 h-full">
      <aside class="hidden md:block w-64 h-full overflow-y-auto no-scrollbar pr-4">
        <div class="flex flex-col gap-2">
          <a href="index.html"
            class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
            <i class="fa-solid fa-house w-6 text-center text-lg"></i> Home
          </a>
          <a href="explore.html"
            class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
            <i class="fa-solid fa-compass w-6 text-center text-lg"></i>
            Explore
          </a>
          <a href="reels.html"
            class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
            <i class="fa-solid fa-video w-6 text-center text-lg"></i> Reels
          </a>
          <a href="bookmarks.html"
            class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
            <i class="fa-solid fa-bookmark w-6 text-center text-lg"></i>
            Bookmarks
          </a>
          <a href="communities.html"
            class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
            <i class="fa-solid fa-users w-6 text-center text-lg"></i>
            Communities
          </a>
          <a href="profile.html"
            class="flex items-center gap-4 p-3 rounded-lg bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 font-semibold transition-all duration-300 hover:translate-x-2">
            <i class="fa-solid fa-user w-6 text-center text-lg"></i> Profile
          </a>
          <a href="settings.html"
            class="flex items-center gap-4 p-3 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 font-medium transition-all duration-300 hover:translate-x-2">
            <i
              class="fa-solid fa-gear w-6 text-center text-lg group-hover:rotate-90 transition-transform duration-300"></i>
            Settings
          </a>
          <button
            class="mt-4 w-full bg-blue-500 text-white font-bold py-3 rounded-full hover:bg-blue-600 transition-all duration-300 shadow-md hover:-translate-y-1 active:scale-95">
            Create Post
          </button>
        </div>
      </aside>

      <section class="flex-1 max-w-4xl h-full overflow-y-auto no-scrollbar pb-20">
        <div
          class="bg-white dark:bg-gray-800 rounded-xl shadow-sm mb-6 border border-gray-200 dark:border-gray-700 overflow-hidden animate-fade-in-up">
          <div class="h-48 sm:h-64 w-full relative">
            <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&q=80&w=1000"
              class="w-full h-full object-cover" />
          </div>
          <div class="px-6 pb-6 relative">
            <div class="flex justify-between items-end -mt-12 sm:-mt-16 mb-4">
              <img src="https://i.pravatar.cc/150?img=11"
                class="w-24 h-24 sm:w-32 sm:h-32 rounded-full border-4 border-white dark:border-gray-800 object-cover -mt-16 z-10" />
              <button class="bg-blue-500 text-white px-6 py-2 rounded-full font-bold text-sm">
                Edit Profile
              </button>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
              Alex Johnson
            </h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">
              @alexj_creator
            </p>
          </div>
        </div>
        <div id="profile-grid" class="grid grid-cols-3 gap-1 sm:gap-4 animate-fade-in-up delay-100"></div>
        <div id="loading-spinner" class="flex justify-center py-8">
          <i class="fa-solid fa-spinner animate-spin text-3xl text-blue-500"></i>
        </div>
      </section>
    </div>
  </main>

  <div
    class="md:hidden fixed bottom-0 w-full bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex justify-around p-3 z-30 transition-colors duration-300">
    <a href="index.html" class="text-gray-500 dark:text-gray-400 text-xl hover:scale-125 transition-transform"><i
        class="fa-solid fa-house"></i></a>
    <a href="explore.html" class="text-gray-500 dark:text-gray-400 text-xl hover:scale-125 transition-transform"><i
        class="fa-solid fa-compass"></i></a>
    <a href="reels.html" class="text-gray-500 dark:text-gray-400 text-xl hover:scale-125 transition-transform"><i
        class="fa-solid fa-video"></i></a>
    <a href="profile.html" class="text-blue-500 text-xl hover:scale-125 transition-transform"><i
        class="fa-solid fa-user"></i></a>
  </div>

  <div id="post-modal"
    class="fixed inset-0 z-50 bg-black/80 flex justify-center items-center backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 p-4">
    <button id="close-modal" class="absolute top-4 right-4 text-white hover:text-gray-300 text-3xl transition-colors">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <div
      class="bg-white dark:bg-gray-900 w-full max-w-5xl h-[85vh] rounded-xl overflow-hidden flex flex-col md:flex-row shadow-2xl transform scale-95 transition-transform duration-300"
      id="modal-content">
      <div class="w-full md:w-3/5 bg-black h-64 md:h-full flex items-center justify-center relative">
        <img id="modal-image" src="" alt="Post Media" class="w-full h-full object-contain" />
      </div>

      <div
        class="w-full md:w-2/5 h-full flex flex-col bg-white dark:bg-gray-900 border-l border-gray-200 dark:border-gray-800">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between">
          <div class="flex gap-3 items-center">
            <img src="https://i.pravatar.cc/150?img=11"
              class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-700" />
            <div>
              <h4 class="font-bold text-gray-900 dark:text-white text-sm">
                Alex Johnson
              </h4>
              <p class="text-xs text-gray-500">@alexj_creator</p>
            </div>
          </div>
          <button id="delete-post-btn" class="text-gray-400 hover:text-red-500 transition-colors hidden">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar p-4 flex flex-col gap-4" id="modal-comments-area">
          <div class="flex gap-3">
            <img src="https://i.pravatar.cc/150?img=11" class="w-8 h-8 rounded-full" />
            <div>
              <span class="font-bold text-gray-900 dark:text-white text-sm">Alex Johnson</span>
              <p id="modal-caption" class="text-gray-800 dark:text-gray-200 text-sm mt-1"></p>
            </div>
          </div>
          <hr class="border-gray-100 dark:border-gray-800" />
        </div>

        <div class="p-4 border-t border-gray-200 dark:border-gray-800">
          <div class="flex justify-between items-center text-gray-500 dark:text-gray-400 text-xl mb-3">
            <div class="flex gap-4">
              <button class="hover:text-red-500 transition-colors active:scale-75">
                <i class="fa-regular fa-heart"></i>
              </button>
              <button class="hover:text-blue-500 transition-colors active:scale-75">
                <i class="fa-regular fa-comment"></i>
              </button>
              <button class="hover:text-green-500 transition-colors active:scale-75">
                <i class="fa-solid fa-retweet"></i>
              </button>
            </div>
            <button class="hover:text-blue-500 transition-colors active:scale-75">
              <i class="fa-regular fa-bookmark"></i>
            </button>
          </div>
          <p class="font-bold text-gray-900 dark:text-white text-sm mb-3" id="modal-likes">
            0 likes
          </p>
          <div class="flex gap-3">
            <input type="text"
              class="flex-1 bg-gray-100 dark:bg-gray-800 dark:text-white rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Add a comment..." />
            <button class="text-blue-500 font-bold px-2 hover:text-blue-600">
              Post
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="profile.js"></script>
</body>

</html>
